<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Продукт - Bimax Pro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header-container">
        <!-- Хедер загружается динамически -->
    </div>

    <main>
        <section class="catalog-header">
            <div class="container">
                <h1 id="product-title">Продукт</h1>
                <p id="product-description">Описание продукта</p>
            </div>
        </section>

        <section class="catalog-content">
            <div class="container">
                <div class="catalog-layout">
                    <!-- Sidebar -->
                    <div class="catalog-sidebar-container">
                        <!-- Боковая панель загружается динамически -->
                    </div>

                    <!-- Main Content -->
                    <div class="catalog-main">
                        <section class="system-detail">
                            <div class="container">
                                <div class="system-detail-view">
                                    <div class="system-content-grid">
                                        <div class="system-image-section">
                                            <div class="system-main-image">
                                                <img id="product-image" src="" alt="Система">
                                            </div>
                                        </div>

                                        <div class="system-specs-section">
                                            <h3>Технические характеристики профиля</h3>

                                            <div id="specs-table" class="specs-table">
                                                <!-- Спецификации будут добавлены здесь -->
                                            </div>

                                            <div class="download-buttons">
                                                <a href="#" class="btn-download primary">
                                                    <span class="download-icon">📄</span>
                                                    Скачать документацию
                                                </a>
                                                <a href="#" class="btn-download secondary">
                                                    Скачать плакат
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </section>

        <!-- Full width CTA section -->
        <section class="cta-section">
            <div class="container">
                <div class="cta-content">
                    <h2 class="cta-title" id="cta-title">Заказать продукт</h2>
                    <p class="cta-description">Свяжитесь с менеджером по вашему региону — подберём систему и рассчитаем стоимость.</p>
                    <a href="contact.html" class="cta-button">Перейти в контакты</a>
                </div>
            </div>
        </section>
    </main>

    <div class="footer-container">
        <!-- Футер загружается динамически -->
    </div>

    <script type="module" src="js/product-loader.js"></script>
</body>
</html>
