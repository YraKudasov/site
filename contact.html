<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты - Bimax Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header-container">
        <!-- Хедер загружается динамически -->
    </div>

    <main>
        <section class="contact">
            <div class="container">
                <h2>Контакты</h2>
                <p>Выберите ваш регион, чтобы узнать контактную информацию менеджера по продажам.</p>
                
                <div class="filters-container">
                    <div class="filter-group">
                        <label for="oblast">Выберите область:</label>
                        <select id="oblast">
                            <option value="">-- Все области --</option>
                            <option value="Волгоградская обл.">Волгоградская область</option>
                        <option value="Астраханская обл.">Астраханская область</option>
                            <option value="Ростовская область">Ростовская область</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="city">Выберите город:</label>
                        <select id="city">
                            <option value="">-- Все города --</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="district">Выберите район:</label>
                        <select id="district">
                            <option value="">-- Все районы --</option>
                        </select>
                    </div>
                </div>
                
                <div id="sales-specialists" class="sales-specialists">
                    <h3>Менеджеры по продажам</h3>
                    <div id="specialists-list" class="specialists-list">
                        <!-- Sales specialists will be inserted here by JS -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="footer-container">
        <!-- Футер загружается динамически -->
    </div>

    <script type="module" src="js/script.js"></script>
</body>
</html>
